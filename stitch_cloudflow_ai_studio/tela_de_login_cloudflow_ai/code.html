<!DOCTYPE html>

                    "primary-fixed-dim": "#c0c1ff",
                    "error-container": "#93000a",
                    "inverse-surface": "#dae2fd",

                    "surface-container": "#171f33",
                    "on-background": "#dae2fd",
                    "surface": "#0b1326",

                    "tertiary-container": "#d97721",

<style>
        /* Essential Material Symbol Setup */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Technical Grid Pattern Background */
        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(70, 69, 84, 0.2) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(70, 69, 84, 0.2) 1px, transparent 1px);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden bg-grid-pattern">
<!-- Ambient Glow behind the card for depth in dark mode -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-inverse-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Login Card Surface -->
<main class="w-full max-w-[420px] px-lg relative z-10">
<div class="bg-surface-container border border-outline-variant/60 rounded-xl p-lg md:p-xl shadow-[0px_8px_32px_rgba(0,0,0,0.4)] backdrop-blur-sm">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 rounded-lg bg-surface-container-high border border-outline-variant flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-inverse-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">
                        cloud_sync
                    </span>
</div>
<h1 class="font-display text-h1 text-on-surface text-center mb-xs">CloudFlow AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Authenticate to access workspace</p>
</div>
<!-- Login Form -->
<form class="space-y-md">
<!-- Email Field -->
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-[6px] uppercase" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[18px]">
                            mail
                        </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-[10px] pl-[36px] pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary focus:outline-none transition-colors" id="email" name="email" placeholder="engineer@domain.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-[6px]">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">
                            Password
                        </label>
<a class="font-body-md text-[12px] text-inverse-primary hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[18px]">
                            lock
                        </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-[10px] pl-[36px] pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-lg bg-inverse-primary hover:bg-inverse-primary/90 text-on-background font-body-lg text-body-lg py-[10px] rounded-lg transition-colors flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 px-md font-label-caps text-label-caps text-outline uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Actions -->
<div class="grid grid-cols-2 gap-md">
<!-- Google Button -->
<button class="flex items-center justify-center gap-sm w-full bg-transparent border border-outline-variant hover:bg-surface-container-highest text-on-surface font-body-md text-body-md py-[10px] rounded-lg transition-colors" type="button">
<svg class="w-[18px] h-[18px]" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<!-- GitHub Button -->
<button class="flex items-center justify-center gap-sm w-full bg-transparent border border-outline-variant hover:bg-surface-container-highest text-on-surface font-body-md text-body-md py-[10px] rounded-lg transition-colors" type="button">
<svg class="w-[18px] h-[18px]" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.11.82-.26.82-.577 0-.285-.01-1.04-.015-2.04-3.338.725-4.043-1.61-4.043-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.238 1.84 1.238 1.07 1.833 2.807 1.303 3.492.997.108-.775.418-1.305.76-1.605-2.665-.305-5.466-1.335-5.466-5.93 0-1.31.467-2.38 1.235-3.22-.123-.305-.535-1.525.117-3.175 0 0 1.007-.322 3.3 1.23.957-.266 1.983-.398 3.003-.403 1.02.005 2.047.137 3.006.403 2.29-1.553 3.295-1.23 3.295-1.23.655 1.65.243 2.87.12 3.175.77.84 1.233 1.91 1.233 3.22 0 4.61-2.807 5.62-5.478 5.92.43.37.813 1.1.813 2.22 0 1.605-.015 2.895-.015 3.285 0 .32.215.695.825.575C20.565 21.795 24 17.3 24 12c0-6.63-5.37-12-12-12z"></path>
</svg>
                    GitHub
                </button>
</div>
<div class="mt-lg text-center">
<p class="font-body-md text-[13px] text-on-surface-variant">
                    Don't have an account? <a class="text-inverse-primary hover:text-primary transition-colors hover:underline" href="#">Request access</a>
</p>
</div>
</div>
</main>
</body></html>
